<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zig Packed Struct Visualizer</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
      }
      .bit-cell {
        transition: all 0.15s ease-in-out;
      }
      .bit-cell:hover {
        transform: scale(1.05);
        z-index: 10;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1f2937;
      }
      ::-webkit-scrollbar-thumb {
        background: #4b5563;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }
    </style>
  </head>
  <body class="bg-gray-950 text-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useMemo, useEffect } = React;

      // Color palette for fields
      const COLORS = [
        {
          bg: "bg-blue-500",
          text: "text-blue-500",
          border: "border-blue-500",
          hover: "hover:bg-blue-400",
        },
        {
          bg: "bg-emerald-500",
          text: "text-emerald-500",
          border: "border-emerald-500",
          hover: "hover:bg-emerald-400",
        },
        {
          bg: "bg-rose-500",
          text: "text-rose-500",
          border: "border-rose-500",
          hover: "hover:bg-rose-400",
        },
        {
          bg: "bg-amber-500",
          text: "text-amber-500",
          border: "border-amber-500",
          hover: "hover:bg-amber-400",
        },
        {
          bg: "bg-purple-500",
          text: "text-purple-500",
          border: "border-purple-500",
          hover: "hover:bg-purple-400",
        },
        {
          bg: "bg-cyan-500",
          text: "text-cyan-500",
          border: "border-cyan-500",
          hover: "hover:bg-cyan-400",
        },
        {
          bg: "bg-pink-500",
          text: "text-pink-500",
          border: "border-pink-500",
          hover: "hover:bg-pink-400",
        },
        {
          bg: "bg-lime-500",
          text: "text-lime-500",
          border: "border-lime-500",
          hover: "hover:bg-lime-400",
        },
      ];

      // Icons
      const PlusIcon = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      );
      const TrashIcon = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      );

      // Helper: safe BigInt parsing
      const safeBigInt = (val) => {
        try {
          if (val === "" || val === null || val === undefined) return 0n;
          const bi = BigInt(val);
          return bi < 0n ? 0n : bi;
        } catch {
          return 0n;
        }
      };

      const App = () => {
        // Initial State: A classic hardware register / protocol header
        const [fields, setFields] = useState([
          { id: "1", name: "is_active", width: 1, value: "1" },
          { id: "2", name: "mode", width: 3, value: "5" },
          { id: "3", name: "flags", width: 4, value: "10" },
          { id: "4", name: "address", width: 16, value: "43981" }, // 0xABCD
        ]);
        const [hoveredFieldId, setHoveredFieldId] = useState(null);

        // Cap total bits to 64 to prevent extreme visual breakdown, though logic supports arbitrary
        const MAX_TOTAL_BITS = 64;

        // Generate structural bit map
        const { bitArray, totalBits, totalValue } = useMemo(() => {
          let bits = [];
          let currentOffset = 0;
          let aggregateValue = 0n;

          fields.forEach((f, idx) => {
            const width = Math.max(1, parseInt(f.width) || 1);
            const color = COLORS[idx % COLORS.length];
            const mask = (1n << BigInt(width)) - 1n;
            const cleanValue = safeBigInt(f.value) & mask;

            aggregateValue |= cleanValue << BigInt(currentOffset);

            for (let i = 0; i < width; i++) {
              bits.push({
                fieldId: f.id,
                fieldName: f.name,
                color: color,
                bitWithinField: i,
                globalBit: currentOffset,
                value: Number((cleanValue >> BigInt(i)) & 1n),
              });
              currentOffset++;
            }
          });

          return {
            bitArray: bits,
            totalBits: currentOffset,
            totalValue: aggregateValue,
          };
        }, [fields]);

        const totalBytes = Math.ceil(totalBits / 8);

        const handleAddField = () => {
          if (totalBits >= MAX_TOTAL_BITS) {
            alert(
              `Maximum width of ${MAX_TOTAL_BITS} bits reached for visualization.`,
            );
            return;
          }
          const newId = Math.random().toString(36).substr(2, 9);
          setFields([
            ...fields,
            {
              id: newId,
              name: `field_${fields.length + 1}`,
              width: 1,
              value: "0",
            },
          ]);
        };

        const handleRemoveField = (id) => {
          setFields(fields.filter((f) => f.id !== id));
        };

        const handleUpdateField = (id, key, val) => {
          setFields(
            fields.map((f) => {
              if (f.id !== id) return f;
              const updated = { ...f, [key]: val };

              // Clamp value to max allowed by new width if width changes
              if (key === "width") {
                let w = parseInt(val);
                if (isNaN(w) || w < 1) w = 1;
                if (w > 64) w = 64; // arbitrary upper bound per field
                updated.width = w;

                const mask = (1n << BigInt(w)) - 1n;
                const currentVal = safeBigInt(updated.value);
                updated.value = (currentVal & mask).toString();
              }

              // Filter numeric input for value
              if (key === "value") {
                const w = parseInt(updated.width) || 1;
                const mask = (1n << BigInt(w)) - 1n;
                const currentVal = safeBigInt(val);
                updated.value = (currentVal & mask).toString();
              }

              return updated;
            }),
          );
        };

        const handleBitToggle = (globalBitIndex) => {
          const bitInfo = bitArray[globalBitIndex];
          if (!bitInfo || bitInfo.isPadding) return;

          setFields(
            fields.map((f) => {
              if (f.id !== bitInfo.fieldId) return f;
              const bitMask = 1n << BigInt(bitInfo.bitWithinField);
              const currentVal = safeBigInt(f.value);
              const newVal = currentVal ^ bitMask; // Toggle
              return { ...f, value: newVal.toString() };
            }),
          );
        };

        const hexValue =
          "0x" +
          totalValue
            .toString(16)
            .toUpperCase()
            .padStart(Math.max(2, Math.ceil(totalBits / 4)), "0");

        return (
          <div className="max-w-7xl mx-auto p-4 md:p-8 flex flex-col lg:flex-row gap-8">
            {/* Left Column: Field Editor */}
            <div className="w-full lg:w-1/3 flex flex-col gap-6">
              <div>
                <h1 className="text-3xl font-bold text-white mb-2">
                  Zig Packed Structs
                </h1>
                <p className="text-gray-400 text-sm">
                  Zig guarantees exact bit-level memory layout for{" "}
                  <code className="text-emerald-400 bg-gray-800 px-1 rounded">
                    packed struct
                  </code>
                  . Fields are laid out sequentially from the Least Significant
                  Bit (LSB) to the Most Significant Bit (MSB).
                </p>
              </div>

              <div className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-xl">
                <div className="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-800/50">
                  <h2 className="font-semibold text-gray-200">Struct Fields</h2>
                  <span className="text-xs text-gray-400 bg-gray-800 px-2 py-1 rounded-full border border-gray-700">
                    Total: {totalBits} bits
                  </span>
                </div>

                <div className="p-4 space-y-3">
                  {fields.map((f, idx) => {
                    const color = COLORS[idx % COLORS.length];
                    const maxVal = (1n << BigInt(f.width)) - 1n;

                    return (
                      <div
                        key={f.id}
                        className={`p-3 rounded-lg border transition-colors ${hoveredFieldId === f.id ? "border-gray-500 bg-gray-800/80" : "border-gray-800 bg-gray-800/30"}`}
                        onMouseEnter={() => setHoveredFieldId(f.id)}
                        onMouseLeave={() => setHoveredFieldId(null)}
                      >
                        <div className="flex gap-2 items-center mb-2">
                          <div
                            className={`w-3 h-3 rounded-full ${color.bg} shadow-[0_0_8px_rgba(0,0,0,0.5)]`}
                          ></div>
                          <input
                            type="text"
                            value={f.name}
                            onChange={(e) =>
                              handleUpdateField(f.id, "name", e.target.value)
                            }
                            className="bg-transparent border-b border-gray-700 focus:border-gray-400 outline-none text-sm font-medium text-gray-200 flex-1 px-1"
                            placeholder="field_name"
                          />
                          <button
                            onClick={() => handleRemoveField(f.id)}
                            className="text-gray-500 hover:text-red-400 transition-colors p-1"
                          >
                            <TrashIcon />
                          </button>
                        </div>
                        <div className="flex gap-3 pl-5 text-sm">
                          <div className="flex flex-col gap-1 w-1/2">
                            <label className="text-xs text-gray-500 uppercase tracking-wider">
                              Bits
                            </label>
                            <div className="flex items-center">
                              <input
                                type="number"
                                min="1"
                                max="64"
                                value={f.width}
                                onChange={(e) =>
                                  handleUpdateField(
                                    f.id,
                                    "width",
                                    e.target.value,
                                  )
                                }
                                className="w-full bg-gray-950 border border-gray-700 rounded px-2 py-1 outline-none focus:border-emerald-500 text-gray-300"
                              />
                            </div>
                          </div>
                          <div className="flex flex-col gap-1 w-1/2">
                            <label className="text-xs text-gray-500 uppercase tracking-wider flex justify-between">
                              <span>Value</span>
                            </label>
                            <input
                              type="number"
                              min="0"
                              max={maxVal.toString()}
                              value={f.value}
                              onChange={(e) =>
                                handleUpdateField(f.id, "value", e.target.value)
                              }
                              className="w-full bg-gray-950 border border-gray-700 rounded px-2 py-1 outline-none focus:border-emerald-500 text-gray-300 font-mono"
                            />
                          </div>
                        </div>
                      </div>
                    );
                  })}

                  <button
                    onClick={handleAddField}
                    disabled={totalBits >= MAX_TOTAL_BITS}
                    className={`w-full py-2.5 rounded-lg border border-dashed flex items-center justify-center gap-2 text-sm transition-colors
                                        ${
                                          totalBits >= MAX_TOTAL_BITS
                                            ? "border-gray-800 text-gray-600 cursor-not-allowed"
                                            : "border-gray-700 text-gray-400 hover:border-gray-500 hover:text-gray-200 hover:bg-gray-800/50"
                                        }`}
                  >
                    <PlusIcon /> Add Field
                  </button>
                </div>
              </div>

              {/* Zig Code Preview */}
              <div className="bg-[#0d1117] border border-gray-800 rounded-xl overflow-hidden shadow-xl">
                <div className="p-3 border-b border-gray-800 flex justify-between items-center bg-[#161b22]">
                  <h2 className="font-semibold text-gray-200 text-sm flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full bg-[#e3b044]"></div>
                    Generated Zig Code
                  </h2>
                </div>
                <div className="p-4 overflow-x-auto">
                  <pre className="text-sm font-mono leading-relaxed text-gray-300">
                    <span className="text-pink-400">const</span>{" "}
                    <span className="text-[#e3b044]">MyPackedStruct</span> ={" "}
                    <span className="text-pink-400">packed struct</span> {"{"}
                    {fields.map((f) => {
                      const typeName =
                        parseInt(f.width) === 1 ? "bool" : `u${f.width}`;
                      return (
                        <div key={f.id} className="pl-4">
                          <span className="text-blue-300">
                            {f.name || "unnamed"}
                          </span>
                          : <span className="text-emerald-400">{typeName}</span>
                          ,
                        </div>
                      );
                    })}
                    {"}"};
                  </pre>
                </div>
              </div>
            </div>

            {/* Right Column: Visualization Grid */}
            <div className="w-full lg:w-2/3 flex flex-col gap-6">
              {/* Overall Backing Value */}
              <div className="bg-gray-900 border border-gray-800 rounded-xl p-5 shadow-xl flex flex-col md:flex-row gap-4 items-center justify-between">
                <div>
                  <h3 className="text-sm text-gray-400 uppercase tracking-wider font-semibold mb-1">
                    Underlying Integer Value
                  </h3>
                  <p className="text-xs text-gray-500">
                    The raw value when this struct is cast to an integer.
                  </p>
                </div>
                <div className="text-right">
                  <div className="text-3xl font-mono text-emerald-400 drop-shadow-[0_0_8px_rgba(52,211,153,0.3)] tracking-wider">
                    {hexValue}
                  </div>
                  <div className="text-xs text-gray-500 font-mono mt-1">
                    {totalValue.toString()} (decimal)
                  </div>
                </div>
              </div>

              {/* Bit Layout Grid */}
              <div className="bg-gray-900 border border-gray-800 rounded-xl p-6 shadow-xl flex-1">
                <div className="flex justify-between items-end mb-6">
                  <div>
                    <h2 className="text-xl font-bold text-gray-200 mb-1">
                      Memory Layout
                    </h2>
                    <p className="text-sm text-gray-400">
                      Click individual bits to toggle. Ordered right-to-left
                      within bytes (MSB to LSB), bytes ordered sequentially.
                    </p>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                  {Array.from({ length: Math.max(1, totalBytes) }).map(
                    (_, byteIndex) => {
                      return (
                        <div
                          key={byteIndex}
                          className="bg-gray-950 border border-gray-800 rounded-lg p-3"
                        >
                          <div className="flex justify-between text-xs text-gray-500 mb-3 px-1 font-mono uppercase tracking-widest border-b border-gray-800 pb-2">
                            <span>Byte {byteIndex}</span>
                            <span>[Off: +0x{byteIndex.toString(16)}]</span>
                          </div>

                          {/* Bit Row: Bit 7 down to Bit 0 */}
                          <div className="flex w-full gap-1">
                            {Array.from({ length: 8 }).map(
                              (_, bitOffsetInByte) => {
                                const bitIndexWithinByte = 7 - bitOffsetInByte; // 7, 6, 5, 4, 3, 2, 1, 0
                                const globalBitIndex =
                                  byteIndex * 8 + bitIndexWithinByte;
                                const bitInfo = bitArray[globalBitIndex];

                                const isPadding = !bitInfo;
                                const isHovered =
                                  bitInfo && bitInfo.fieldId === hoveredFieldId;
                                const val = isPadding ? 0 : bitInfo.value;

                                return (
                                  <div
                                    key={globalBitIndex}
                                    onClick={() =>
                                      !isPadding &&
                                      handleBitToggle(globalBitIndex)
                                    }
                                    onMouseEnter={() =>
                                      !isPadding &&
                                      setHoveredFieldId(bitInfo.fieldId)
                                    }
                                    onMouseLeave={() =>
                                      !isPadding && setHoveredFieldId(null)
                                    }
                                    className={`
                                                                relative flex-1 aspect-square rounded-sm flex flex-col items-center justify-center cursor-pointer bit-cell font-mono text-sm sm:text-base font-bold
                                                                ${
                                                                  isPadding
                                                                    ? "bg-gray-900 border border-gray-800 text-gray-700 cursor-not-allowed pattern-diagonal-lines pattern-gray-800 pattern-bg-gray-900 pattern-size-2 pattern-opacity-50"
                                                                    : `${bitInfo.color.bg} ${isHovered ? "ring-2 ring-white ring-offset-2 ring-offset-gray-950 scale-110 z-10 shadow-lg" : "opacity-90"}`
                                                                }
                                                                ${!isPadding && val === 1 ? "text-white" : ""}
                                                                ${!isPadding && val === 0 ? "text-black/60" : ""}
                                                            `}
                                    title={
                                      isPadding
                                        ? `Padding Bit ${globalBitIndex}`
                                        : `${bitInfo.fieldName} (Bit ${bitInfo.bitWithinField}) - Global Bit ${globalBitIndex}`
                                    }
                                  >
                                    {/* Bit value */}
                                    {val}

                                    {/* Bit Index Indicator (tiny text at bottom) */}
                                    <span
                                      className={`absolute bottom-0.5 text-[0.55rem] leading-none ${isPadding ? "text-gray-800" : val === 1 ? "text-white/50" : "text-black/40"}`}
                                    >
                                      {bitIndexWithinByte}
                                    </span>
                                  </div>
                                );
                              },
                            )}
                          </div>

                          {/* Labels underneath the byte */}
                          <div className="flex justify-between mt-1 text-[0.65rem] text-gray-600 px-1">
                            <span>MSB</span>
                            <span>LSB</span>
                          </div>
                        </div>
                      );
                    },
                  )}
                </div>

                {/* Legend */}
                <div className="mt-8 pt-6 border-t border-gray-800">
                  <h4 className="text-xs text-gray-500 uppercase tracking-wider mb-3">
                    Field Legend
                  </h4>
                  <div className="flex flex-wrap gap-x-6 gap-y-3">
                    {fields.map((f, idx) => {
                      const color = COLORS[idx % COLORS.length];
                      return (
                        <div
                          key={f.id}
                          className={`flex items-center gap-2 cursor-pointer transition-opacity ${hoveredFieldId && hoveredFieldId !== f.id ? "opacity-30" : "opacity-100"}`}
                          onMouseEnter={() => setHoveredFieldId(f.id)}
                          onMouseLeave={() => setHoveredFieldId(null)}
                        >
                          <div
                            className={`w-4 h-4 rounded-sm ${color.bg}`}
                          ></div>
                          <span className="text-sm text-gray-300 font-mono">
                            {f.name}
                          </span>
                          <span className="text-xs text-gray-600">
                            ({f.width}b)
                          </span>
                        </div>
                      );
                    })}
                    {totalBits % 8 !== 0 && (
                      <div className="flex items-center gap-2 opacity-50">
                        <div
                          className={`w-4 h-4 rounded-sm bg-gray-900 border border-gray-700 pattern-diagonal-lines pattern-gray-800 pattern-bg-gray-900 pattern-size-2 pattern-opacity-50`}
                        ></div>
                        <span className="text-sm text-gray-400 font-mono">
                          padding
                        </span>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
